# =============================================================================
#   ifc-lite — mise task index
# =============================================================================
#
# Run `mise tasks` for the full list. The naming convention is `<verb>:<target>`
# where target is one of: web (viewer), embed (viewer-embed), desktop (Tauri),
# server (Rust axum), cli, all.
#
# ─── Quickstart ────────────────────────────────────────────────────────────────
#   mise install         provision toolchain (node, rust, wasm-pack, turbo,
#                        pitchfork, wrangler) — only needed once per clone
#   mise run wasm        build the Rust → WASM bindings (slow first time)
#   mise run dev:web     start the viewer with HMR at http://localhost:3000
#   mise run dev:all     viewer + Rust server together under pitchfork
#                        (viewer :3000, server :8080)
#
# ─── Build matrix ──────────────────────────────────────────────────────────────
#   build:web            apps/viewer/dist/             (vite + turbo)
#   build:embed          apps/viewer-embed/dist/       (vite + turbo)
#   build:desktop        apps/desktop/src-tauri/target/release/bundle/  (Tauri)
#   build:server         target/release/ifc-lite-server                 (cargo)
#   build:cli            packages/cli/dist/                              (tsc + turbo)
#   build:all            fan out to all of the above
#
# ─── Deploy targets ────────────────────────────────────────────────────────────
#   deploy:web    →  https://ifc-lite-viewer.gedw99.workers.dev
#                    Cloudflare Workers Static Assets, SPA mode.
#                    Production bundle has VITE_USE_SERVER=false so parsing
#                    runs in-browser via WASM (no backend dependency).
#
#   deploy:embed  →  https://ifc-lite-viewer-embed.gedw99.workers.dev
#                    Same CF Workers deploy, headless variant for iframe
#                    integrations (Power BI, Superset, etc.).
#
#   deploy:all    →  fan out (web + embed)
#
#   The Rust server (apps/server) is NOT deployed to Cloudflare — Containers
#   cold-start and pricing don't fit. If users need server-side acceleration
#   for very large IFCs, deploy the binary to Railway/Fly/Hetzner and set
#   VITE_IFC_SERVER_URL + VITE_USE_SERVER=true on the viewer build.
#
# ─── Local-dev env ─────────────────────────────────────────────────────────────
#   apps/viewer/.env.local       — gitignored; if present, viewer routes
#                                  parse calls to a local server (used by
#                                  `mise run dev:all`).
#   apps/viewer/.env.production  — committed; forces in-browser WASM in
#                                  production bundles regardless of .env.local.
#
# ─── Process supervisor ────────────────────────────────────────────────────────
#   pitchfork.toml declares the daemons used by `dev:all`. Inspect with:
#     pitchfork list
#     pitchfork logs viewer
#     pitchfork stop viewer server
#
# =============================================================================

[tools]
# Pin every tool to a specific minor version. 'latest' bit us with
# wrangler 4.85.0 (broke deploys silently) — never again. Bump
# deliberately, not accidentally.
node = "22"
# Nightly required for WASM build (build-std feature).
# Server binary also builds fine on this.
rust = "nightly-2025-11-15"
"cargo:wasm-pack" = "0.13"      # was "latest"
"npm:turbo" = "2"
# Process supervisor for dev:all (web + server together).
# pitchfork moved jdx → endevco/pitchfork in 2026; mise's default
# 'pitchfork' alias still points at jdx, so use the github backend
# explicitly to track the active fork.
"github:endevco/pitchfork" = "2.7"
# Cloudflare CLI for deploy:web / deploy:embed.
# 4.85.0 has a 'Could not route 7003' regression on `wrangler deploy
# --env <name>`. Pin to known-good until upstream fixes.
"npm:wrangler" = "4.84.1"
# Bun: kept available for experiments (was tried for build:cli-bin, see
# note below the build:cli task). Not used by any task currently.
bun = "1.3"
# fnox: secrets manager by jdx (same author as mise). All secrets are
# stored in the macOS Keychain (service=fnox) via fnox's `keychain`
# provider. ~/.config/fnox/config.toml maps secret names to keychain
# entries — no encrypted blobs in the file. CI doesn't run fnox; it
# reads secrets injected as env vars from GitHub Actions repo secrets,
# pushed there by `mise run secrets:sync-github` from a dev machine.
"github:jdx/fnox" = "1.23"
# GitHub CLI: used by secrets:sync-github + scripts/sync-github-secrets.sh
# and by secrets:status. Pinning here keeps mise as the SSOT for tools.
"aqua:cli/cli" = "2"
# Script dependencies (used by scripts that touch the CF API or sync
# secrets). Without these in mise, fresh devs hit cryptic 'command
# not found' on Linux runners that don't have them preinstalled.
"aqua:jqlang/jq" = "1"
"aqua:a8m/envsubst" = "1"

[env]
# pnpm is managed via corepack (bundled with node)

[tasks.install]
description = "Install JS dependencies (with safety nuke if a foreign package manager left artifacts)"
# If aube/yarn/npm left behind their layout (e.g. .aube/ symlinks), pnpm
# won't always restore per-package node_modules/@types/ correctly. Detect
# and nuke first.
run = """
corepack enable
if [ -d node_modules/.aube ] || [ -d node_modules/.yarn ]; then
  echo "→ foreign package manager artifacts detected; nuking node_modules first"
  rm -rf node_modules apps/*/node_modules packages/*/node_modules 2>/dev/null || true
fi
pnpm install
"""

[tasks."rust:components"]
description = "Ensure rust-toolchain.toml components/targets are installed (idempotent, cross-shell)"
# One-liner: works in bash AND cmd.exe (no heredoc, no >/dev/null redirects).
# `rustup show` is idempotent and reads rust-toolchain.toml; the explicit
# component/target adds are belt-and-braces for cache-restore cases.
run = "rustup show && rustup component add rust-src --toolchain nightly-2025-11-15 && rustup target add wasm32-unknown-unknown --toolchain nightly-2025-11-15"

[tasks.wasm]
description = "Build Rust WASM bindings"
run = "bash scripts/build-wasm.sh"
depends = ["install", "rust:components"]

[tasks.build]
description = "Build all packages (WASM + TS)"
run = "turbo build"
depends = ["wasm"]

[tasks.dev]
description = "Start viewer dev server"
run = "turbo dev --filter viewer"
depends = ["wasm"]

[tasks.test]
description = "Run all tests"
run = "turbo test"
depends = ["wasm"]

[tasks.typecheck]
description = "Type-check all packages"
run = "turbo typecheck"
depends = ["wasm"]

[tasks.lint]
description = "Lint all packages"
run = "turbo lint"
depends = ["wasm"]

[tasks.test-models]
description = "Download IFC test models from public repos"
run = "bash scripts/fetch-test-models.sh"

[tasks.server]
description = "Build Rust server binary"
run = "cargo build --release --package ifc-lite-server"

# ---- Targeted builds: web, embed, desktop, server ----
# Each delegates to the package's own existing script (pnpm / turbo / cargo / tauri)
# so the per-package source of truth (package.json or Cargo.toml) stays authoritative.

[tasks."build:web"]
description = "Production bundle of the browser viewer (apps/viewer → dist/)"
run = "turbo build --filter @ifc-lite/viewer"
depends = ["wasm"]

[tasks."build:embed"]
description = "Production bundle of the embeddable viewer (apps/viewer-embed → dist/)"
run = "turbo build --filter @ifc-lite/viewer-embed"
depends = ["wasm"]

[tasks."build:desktop"]
description = "Tauri desktop build for the current platform (no specific target). For CI/cross-arch use build:desktop-target."
run = "pnpm --filter @ifc-lite/desktop exec tauri build"
depends = ["wasm"]

[tasks."build:desktop-target"]
description = "Tauri build for an explicit Rust triple, with macOS ad-hoc sign baked in. Usage: TARGET=aarch64-apple-darwin mise run build:desktop-target"
depends = ["wasm"]
run = """
# mise's `bash -c` shell does NOT bind args after `--` to $1/$2 — they get
# appended to the script body as text instead (verified: argc=0 with -- foo).
# Use TARGET env var instead. Same gotcha bit auth-service; see CLAUDE.md.
TARGET="${TARGET:?usage: TARGET=<rust-triple> mise run build:desktop-target}"
EXTRA=""
case "$TARGET" in
  *-apple-darwin)
    EXTRA="--config src-tauri/tauri.macos-adhoc.json"
    ;;
esac
# Updater payloads (.app.tar.gz / .AppImage.tar.gz / .msi.zip + .sig) need
# TAURI_SIGNING_PRIVATE_KEY. If unset (typical local dev), layer in an
# override that disables createUpdaterArtifacts so the build still succeeds.
# CI sets the secret, so it produces the signed updater artifacts.
if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
  EXTRA="$EXTRA --config src-tauri/tauri.no-updater.json"
fi
pnpm --filter @ifc-lite/desktop exec tauri build --target "$TARGET" $EXTRA
"""

[tasks."install:desktop"]
description = "Install the locally-built IFC-Lite Viewer.app to /Applications (macOS only). Run build:desktop-target first."
run = """
case "$(uname -s)" in
  Darwin) ;;
  *) echo "install:desktop is macOS only"; exit 1;;
esac
ARCH=$(uname -m); case "$ARCH" in arm64) TRIPLE=aarch64-apple-darwin;; x86_64) TRIPLE=x86_64-apple-darwin;; esac
SRC="target/${TRIPLE}/release/bundle/macos/IFC-Lite Viewer.app"
DST="/Applications/IFC-Lite Viewer.app"
[ -d "$SRC" ] || { echo "✗ no bundle at $SRC — run 'TARGET=$TRIPLE mise run build:desktop-target' first"; exit 1; }
[ -d "$DST" ] && { echo "→ removing existing $DST"; rm -rf "$DST"; }
cp -R "$SRC" "$DST"
echo "✓ installed: $DST"
echo "  installed version: $(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$DST/Contents/Info.plist")"
"""

[tasks."launch:desktop"]
description = "Open the installed IFC-Lite Viewer.app (macOS)."
run = """
APP="/Applications/IFC-Lite Viewer.app"
[ -d "$APP" ] || { echo "✗ not installed; run 'mise run install:desktop' first"; exit 1; }
open "$APP"
echo "✓ launched"
"""

[tasks."updater:check"]
description = "Simulate what the installed app sends to the updater endpoint. Shows whether an update would be offered. Usage: VERSION=1.1.6 mise run updater:check (defaults to installed version)"
run = """
APP="/Applications/IFC-Lite Viewer.app"
if [ -d "$APP" ] && [ -z "${VERSION:-}" ]; then
  VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP/Contents/Info.plist")
fi
VERSION="${VERSION:?usage: VERSION=<x.y.z> mise run updater:check (or install the app first)}"
ARCH=$(uname -m); case "$ARCH" in arm64) TARGET_ARCH=aarch64;; x86_64) TARGET_ARCH=x86_64;; *) TARGET_ARCH="$ARCH";; esac
URL="https://ifc-lite-viewer.gedw99.workers.dev/api/updater/darwin/${TARGET_ARCH}/${VERSION}"
echo "→ GET $URL"
RESP=$(curl -sS -w '\\n%{http_code}' "$URL")
CODE=$(printf '%s' "$RESP" | tail -1)
BODY=$(printf '%s' "$RESP" | sed '$d')
echo "→ HTTP $CODE"
case "$CODE" in
  204) echo "✓ no update — installed version is current";;
  200) echo "↑ UPDATE OFFERED:"; printf '%s' "$BODY" | jq .;;
  *)   echo "✗ unexpected response:"; printf '%s' "$BODY"; exit 1;;
esac
"""

[tasks."build:server"]
description = "Rust server release binary (target/release/ifc-lite-server)"
run = "cargo build --release --package ifc-lite-server"

[tasks."build:cli"]
description = "CLI JS bundle (packages/cli → dist/index.js)"
run = "turbo build --filter @ifc-lite/cli"
depends = ["wasm"]

# NOTE: Standalone CLI binaries via bun --compile attempted and reverted.
# bun's static analysis of .d.ts files trips on a stale export resolution
# in @ifc-lite/parser (imports parseIfcx + detectFormat from @ifc-lite/ifcx
# whose .d.ts bun won't parse correctly even after rebuild). Path forward
# either needs an upstream fix to parser/ifcx exports OR a switch to
# Node SEA (experimental). For now the canonical install is via mise's
# npm backend, which works today:
#
#   mise use -g npm:@ifc-lite/cli

[tasks."build:all"]
description = "Build every shippable target: web + embed + desktop + server + cli"
depends = ["build:web", "build:embed", "build:desktop", "build:server", "build:cli"]

# ---- Targeted dev servers ----

[tasks."dev:web"]
description = "Viewer dev server with HMR (apps/viewer)"
run = "turbo dev --filter @ifc-lite/viewer"
depends = ["wasm"]

[tasks."dev:embed"]
description = "Embeddable viewer dev server (apps/viewer-embed)"
run = "turbo dev --filter @ifc-lite/viewer-embed"
depends = ["wasm"]

[tasks."dev:desktop"]
description = "Tauri dev (native window + HMR for the embedded viewer)"
run = "pnpm --filter @ifc-lite/desktop exec tauri dev"
depends = ["wasm"]

[tasks."dev:server"]
description = "Run the Rust server in release mode (rebuild + run)"
run = "cargo run --release --package ifc-lite-server"

# ---- Cloudflare deploys (viewer + embed; server is NOT deployed to CF) ----

[tasks."deploy:web"]
description = "Deploy viewer → https://ifc-lite-viewer.gedw99.workers.dev (CF Workers Static Assets, SPA)"
depends = ["build:web"]
dir = "apps/viewer"
run = "wrangler deploy"

[tasks."deploy:embed"]
description = "Deploy embed → https://ifc-lite-viewer-embed.gedw99.workers.dev (iframe variant)"
depends = ["build:embed"]
dir = "apps/viewer-embed"
run = "wrangler deploy"

[tasks."deploy:all"]
description = "Deploy every CF target (web + embed). Server is NOT on CF — see top of file."
depends = ["deploy:web", "deploy:embed"]

# ---- Secrets (fnox → GitHub Actions) ----
# https://fnox.jdx.dev
# fnox is the local source of truth, backed by macOS Keychain via the
# global `~/.config/fnox/config.toml`. These mise tasks render fnox's
# values into GitHub repo Actions secrets so CI workflows can read them.
# Set values once globally with: fnox set <KEY> --global --provider keychain

[tasks."secrets:list"]
description = "Show the canonical secret mapping (fnox key → GitHub secret name)"
run = """
echo "Defined in scripts/sync-github-secrets.sh MAPPING table:"
grep -E '^\\s+"[A-Z_]+\\s+[A-Z_]+"' scripts/sync-github-secrets.sh | sed 's/^/  /'
echo
echo "Uncomment optional rows in scripts/sync-github-secrets.sh as new"
echo "secrets are added to fnox (e.g. signing certs)."
"""

[tasks."secrets:status"]
description = "Show fnox secrets vs GitHub repo secrets (read-only)"
run = """
echo "== fnox =="
fnox list 2>/dev/null || echo "  (no config — run: fnox init --global)"
echo
echo "== GitHub repo secrets (joeblew999/ifc-lite) =="
gh secret list --repo joeblew999/ifc-lite 2>/dev/null || echo "  (run: gh auth login)"
"""

[tasks."secrets:sync-github"]
description = "Push secrets from fnox → GitHub Actions repo secrets"
run = "bash scripts/sync-github-secrets.sh"

[tasks."secrets:sync-github-dry"]
description = "Dry-run of secrets:sync-github (show plan, change nothing)"
run = "bash scripts/sync-github-secrets.sh --dry-run"

[tasks."secrets:migrate-to-keychain"]
description = "Move every age-encrypted secret in fnox global config → OS keychain"
# Idempotent. Discovers age-provider entries dynamically, so any future secret
# added on age gets migrated next run. Non-age providers are left alone.
# Operates on ~/.config/fnox/config.toml. After running, optionally enable
# Touch ID per item via Keychain Access.app → Access Control on each item
# under service=fnox (the keyring crate fnox uses can't set biometric ACLs
# at creation, so it's a manual GUI step).
run = """
set -euo pipefail

# Defensive: some IDE shells leak FNOX_AGE_KEY=undefined into the env
# (anthropics/claude-code#53833). fnox prefers FNOX_AGE_KEY (inline value)
# over FNOX_AGE_KEY_FILE, so the leaked string makes parsing fail with
# "non-identity data on line 1".
unset FNOX_AGE_KEY

CONFIG="$HOME/.config/fnox/config.toml"

if ! grep -qE '^\\[providers\\.keychain\\]|^keychain[[:space:]]*=' "$CONFIG"; then
  echo "→ adding keychain provider to global config"
  fnox provider add --global keychain keychain
else
  echo "✓ keychain provider already configured"
fi

# Extract every secret name currently using provider = "age".
# Format: `KEY= { provider = "age", value = "..." }` on a single line.
# Note: avoid ${ + # array-length syntax — Tera (mise's template engine)
# treats `{`+`#` as the start of a comment block.
AGE_LIST="$(grep -E '^[A-Z_][A-Z0-9_]*=[[:space:]]*\\{[[:space:]]*provider[[:space:]]*=[[:space:]]*"age"' "$CONFIG" | sed -E 's/^([A-Z_][A-Z0-9_]*)=.*/\\1/' || true)"

if [ -z "$AGE_LIST" ]; then
  echo "✓ no age-encrypted secrets remain — nothing to migrate"
  exit 0
fi

COUNT=$(printf '%s\\n' "$AGE_LIST" | wc -l | tr -d ' ')
echo "→ migrating $COUNT secret(s) from age → keychain"
while IFS= read -r SECRET; do
  [ -z "$SECRET" ] && continue
  echo "→ $SECRET"
  VALUE="$(fnox get "$SECRET")"
  printf '%s' "$VALUE" | fnox set --global -p keychain "$SECRET"
  unset VALUE
done <<< "$AGE_LIST"

echo
echo "Done. Verify with: mise run secrets:sync-github-dry"
"""

[tasks."deploy:status"]
description = "Print deployed URLs and check they're live (--fail makes non-2xx exit non-zero so CI catches broken deploys)"
run = """
echo "Viewer:  https://ifc-lite-viewer.gedw99.workers.dev"
curl -fsS -o /dev/null -w "         HTTP %{http_code}, %{time_total}s\\n" https://ifc-lite-viewer.gedw99.workers.dev/
echo "Embed:   https://ifc-lite-viewer-embed.gedw99.workers.dev"
curl -fsS -o /dev/null -w "         HTTP %{http_code}, %{time_total}s\\n" https://ifc-lite-viewer-embed.gedw99.workers.dev/
"""

[tasks."dev:all"]
description = "Supervise viewer + server together via pitchfork (uses pitchfork.toml)"
depends = ["wasm", "build:server"]
run = """
pitchfork supervisor start
pitchfork start -l -f
pitchfork list
echo
echo "Viewer:  http://localhost:3000"
echo "Server:  http://localhost:8080"
echo "Logs:    pitchfork logs viewer | pitchfork logs server"
echo "Stop:    pitchfork stop viewer server"
"""

[tasks.clean]
description = "Clean all build outputs"
run = """
rm -rf packages/*/dist apps/*/dist packages/wasm/pkg target
pnpm store prune 2>/dev/null || true
"""
