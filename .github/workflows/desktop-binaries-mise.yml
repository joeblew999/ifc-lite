# Builds the Tauri desktop app (apps/desktop) for macOS (universal),
# Windows (x64) and Linux (x64). PR runs are validation-only; pushes to
# main upload artifacts; published GitHub Releases attach the bundles
# (.dmg / .msi / .AppImage / .deb) to the release.
#
# Companion to .github/workflows/server-binaries.yml — same trigger model,
# same release-attachment behaviour, different artifact (GUI app vs server
# binary). Together they cover every native target users might want.

name: Desktop Binaries (mise)

on:
  push:
    branches:
      - main
      - cloudflare/deploy   # active integration branch — triggers same as main pre-merge
    paths:
      - '.github/workflows/desktop-binaries-mise.yml'
      - 'apps/desktop/**'
      - 'packages/wasm/**'
      - 'rust/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
  pull_request:
    paths:
      - '.github/workflows/desktop-binaries-mise.yml'
      - 'apps/desktop/**'
      - 'packages/wasm/**'
      - 'rust/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
  release:
    types:
      - published
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build-desktop:
    name: Build desktop (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write     # needed for release upload
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each platform invokes the SAME mise task (build:desktop-target)
          # with its rust triple as arg. Local devs run the identical
          # command:  mise run build:desktop-target -- aarch64-apple-darwin
          # The task handles macOS ad-hoc signing automatically (no cert
          # needed). SSOT: workflow + local share one definition.
          - target: macos-arm64
            os: macos-14
            rust-target: 'aarch64-apple-darwin'
          - target: macos-x64
            os: macos-14
            rust-target: 'x86_64-apple-darwin'
          - target: windows-x64
            os: windows-latest
            rust-target: 'x86_64-pc-windows-msvc'
          # ubuntu-22.04 ships glibc 2.35; mise-installed wasm-pack needs
          # GLIBC_2.39, so use ubuntu-latest (24.04 = glibc 2.39).
          - target: linux-x64
            os: ubuntu-latest
            rust-target: 'x86_64-unknown-linux-gnu'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: false

      # SSOT: mise installs node, rust (pinned nightly via .mise.toml),
      # wasm-pack, turbo — same toolchain devs use locally. No duplicated
      # tool-version declarations in the workflow.
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      # Per-platform binary target. mise's rust toolchain ships with the
      # channel; platform-specific binary targets are workflow concerns,
      # not project SSOT.
      # `shell: bash` is required because windows-latest defaults to PowerShell.
      - name: Add Rust platform target
        shell: bash
        run: rustup target add "${{ matrix.rust-target }}"

      # Tauri's webview / bundling deps. macOS and Windows have what they need
      # in the runner image already; only Linux needs apt installs.
      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      # Install JS deps + build WASM (rust:components dependency ensures
      # rust-src + wasm32 target are present even on cache hits).
      - name: Install JS deps + build WASM
        shell: bash
        run: |
          mise run install
          mise run wasm

      # Windows: pnpm's per-package symlinks are flaky on the runner. Force
      # a fresh install with --shamefully-hoist as a CLI flag (the .npmrc
      # node-linker=hoisted setting alone wasn't enough), then verify tsc
      # is reachable. If this still doesn't work the next move is a
      # prebuild-js job on Linux that uploads an artifact.
      - name: Windows — force flat node_modules
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mise exec -- pnpm install --shamefully-hoist
          echo "=== Verify tsc is reachable ==="
          ls node_modules/.bin/tsc.cmd node_modules/.bin/tsc 2>&1 | head -5
          mise exec -- pnpm exec tsc --version 2>&1 | head -3

      # Build only what apps/desktop transitively depends on. Building the
      # whole workspace (including standalone @ifc-lite/viewer with cesium
      # + maplibre chunks) was causing OOM on macos runners.
      - name: Build desktop's workspace deps
        run: mise exec -- pnpm build --filter @ifc-lite/desktop...

      # Tauri-action drives the whole bundle pipeline:
      #   - vite build of the desktop frontend
      #   - cargo build of src-tauri
      #   - platform bundler (.dmg / .msi / .AppImage + .deb)
      # And attaches the bundles to the triggering release if any.
      # tauri-action (any version) bundles JS with a top-level await that
      # crashes on Node 22 mise installs. Skip the action and call tauri
      # directly — fewer moving parts, same outcome.
      # Hard-fail on a release build if the updater key is missing.
      # Without this we'd ship unsigned bundles, then desktop clients would
      # silently reject the update because the signature verification fails.
      # Non-release builds (PRs, branch pushes) skip the check so contributors
      # without secret access can still build artifacts locally.
      - name: Assert Tauri signing key is set (release builds only)
        if: github.event_name == 'release'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set on this repo."
            echo "::error::Generate a key locally with 'mise exec -- tauri signer generate -w ~/.tauri/ifc-lite.key',"
            echo "::error::then set it: cat ~/.tauri/ifc-lite.key | gh secret set TAURI_SIGNING_PRIVATE_KEY -R joeblew999/ifc-lite"
            exit 1
          fi
          echo "✓ TAURI_SIGNING_PRIVATE_KEY is set ($(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | wc -c) chars)"

      - name: Build desktop bundle
        shell: bash
        env:
          # Optional code-signing secrets. When unset (no certs in repo),
          # we explicitly disable signing — otherwise tauri tries to use
          # an empty identity and fails with `SecKeychainItemImport`.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # SSOT: same task local devs run. The task knows to layer the
          # macOS ad-hoc sign config onto *-apple-darwin triples.
          # mise's `bash -c` shell drops args after --, so use env var.
          TARGET="${{ matrix.rust-target }}" mise run build:desktop-target

      # Attach to release on `release: published`, otherwise just upload as artifact.
      - name: Attach bundles to release
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find every produced bundle, including the .tar.gz / .zip
          # updater payloads (createUpdaterArtifacts: true) and their .sig
          # files. Tauri's auto-updater consumes the *.tar.gz / *.zip;
          # human users grab the .dmg / .msi / .AppImage / .deb.
          shopt -s nullglob globstar
          files=(
            target/**/release/bundle/dmg/*.dmg
            target/**/release/bundle/msi/*.msi
            target/**/release/bundle/appimage/*.AppImage
            target/**/release/bundle/deb/*.deb
            target/**/release/bundle/macos/*.app.tar.gz
            target/**/release/bundle/macos/*.app.tar.gz.sig
            target/**/release/bundle/appimage/*.AppImage.tar.gz
            target/**/release/bundle/appimage/*.AppImage.tar.gz.sig
            target/**/release/bundle/msi/*.msi.zip
            target/**/release/bundle/msi/*.msi.zip.sig
          )
          if (( ${#files[@]} == 0 )); then
            echo "no bundles produced — check tauri build step" >&2
            exit 1
          fi
          gh release upload "${{ github.event.release.tag_name }}" --clobber "${files[@]}"

      # For non-release runs, save artifacts so PRs can be downloaded.
      - name: Upload bundles (PR / push)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ifc-lite-desktop-${{ matrix.target }}
          path: |
            target/*/release/bundle/dmg/*.dmg
            target/*/release/bundle/msi/*.msi
            target/*/release/bundle/appimage/*.AppImage
            target/*/release/bundle/deb/*.deb
            target/*/release/bundle/macos/*.app.tar.gz
            target/*/release/bundle/macos/*.app.tar.gz.sig
            target/*/release/bundle/appimage/*.AppImage.tar.gz
            target/*/release/bundle/appimage/*.AppImage.tar.gz.sig
            target/*/release/bundle/msi/*.msi.zip
            target/*/release/bundle/msi/*.msi.zip.sig
          if-no-files-found: warn
