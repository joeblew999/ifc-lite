# Validates the codebase compiles + tests pass on every push / PR to
# the active branches. mise SSOT — every task here is identical to what
# devs run locally:
#
#   mise run typecheck
#   mise run lint
#   mise run test
#   mise run build:cli
#   mise run build:server
#
# Single job by design: wasm is the slow first step (rust → wasm-pack),
# everything downstream hits the wasm + cargo + node_modules caches the
# mise-action restored. Splitting into a matrix would build wasm N times.

name: Quality (mise)

on:
  push:
    branches:
      - main
      - cloudflare/deploy
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'rust/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.mise.toml'
      - '.github/workflows/quality-mise.yml'
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'rust/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.mise.toml'
      - '.github/workflows/quality-mise.yml'
  workflow_dispatch:

concurrency:
  group: quality-mise-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck + lint + test + build (cli + server)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      # SSOT: mise installs node, rust (pinned nightly), wasm-pack, turbo,
      # bun — same as local. No setup-node / setup-rust / etc.
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Typecheck (mise run typecheck)
        run: mise run typecheck

      - name: Lint (mise run lint)
        run: mise run lint

      - name: Test (mise run test)
        run: mise run test

      - name: Build CLI (mise run build:cli)
        run: mise run build:cli

      - name: Build Server (mise run build:server)
        run: mise run build:server
