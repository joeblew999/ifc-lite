# Auto-deploys the viewer + viewer-embed to Cloudflare Workers Static Assets
# whenever the relevant source changes on main. Manual dispatch is also
# supported for ad-hoc reships.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — Workers API token with "Edit Cloudflare Workers"
#                            template permissions on the account that owns
#                            the existing ifc-lite-viewer Worker.
#   CLOUDFLARE_ACCOUNT_ID  — the account containing the Worker
#                            (gedw99@gmail.com → 7384af54e33b8a54ff240371ea368440)
#
# Live URLs after this workflow runs:
#   https://ifc-lite-viewer.gedw99.workers.dev
#   https://ifc-lite-viewer-embed.gedw99.workers.dev

name: Cloudflare Deploy

on:
  push:
    branches:
      - main
      - cloudflare/deploy
    paths:
      - 'apps/viewer/**'
      - 'apps/viewer-embed/**'
      - 'packages/**'
      - '.github/workflows/cloudflare-deploy.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which app to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - web
          - embed

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ matrix.app }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: viewer
            filter: '@ifc-lite/viewer'
            project_dir: apps/viewer
          - app: viewer-embed
            filter: '@ifc-lite/viewer-embed'
            project_dir: apps/viewer-embed

    steps:
      - name: Skip if dispatch target excludes this app
        id: gate
        run: |
          target='${{ github.event.inputs.target }}'
          app='${{ matrix.app }}'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "$target" in
              all) echo "run=true" >> "$GITHUB_OUTPUT" ;;
              web)   if [ "$app" = "viewer" ]; then echo "run=true" >> "$GITHUB_OUTPUT"; else echo "run=false" >> "$GITHUB_OUTPUT"; fi ;;
              embed) if [ "$app" = "viewer-embed" ]; then echo "run=true" >> "$GITHUB_OUTPUT"; else echo "run=false" >> "$GITHUB_OUTPUT"; fi ;;
            esac
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup pnpm
        if: steps.gate.outputs.run == 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (for WASM)
        if: steps.gate.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        if: steps.gate.outputs.run == 'true'
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - name: Install JS deps
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build WASM bindings
        if: steps.gate.outputs.run == 'true'
        run: bash scripts/build-wasm.sh

      - name: Build app
        if: steps.gate.outputs.run == 'true'
        run: pnpm turbo build --filter ${{ matrix.filter }}

      - name: Deploy to Cloudflare Workers
        if: steps.gate.outputs.run == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.project_dir }}
          command: deploy
