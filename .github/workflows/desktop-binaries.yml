# Builds the Tauri desktop app (apps/desktop) for macOS (universal),
# Windows (x64) and Linux (x64). PR runs are validation-only; pushes to
# main upload artifacts; published GitHub Releases attach the bundles
# (.dmg / .msi / .AppImage / .deb) to the release.
#
# Companion to .github/workflows/server-binaries.yml — same trigger model,
# same release-attachment behaviour, different artifact (GUI app vs server
# binary). Together they cover every native target users might want.

name: Desktop Binaries

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/desktop-binaries.yml'
      - 'apps/desktop/**'
      - 'packages/wasm/**'
      - 'rust/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
  pull_request:
    paths:
      - '.github/workflows/desktop-binaries.yml'
      - 'apps/desktop/**'
      - 'packages/wasm/**'
      - 'rust/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'rust-toolchain.toml'
  release:
    types:
      - published
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build-desktop:
    name: Build desktop (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write     # needed for release upload
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-14 (free Apple Silicon, 7GB RAM). Earlier OOM was from
          # building the whole workspace incl. @ifc-lite/viewer; now filtered
          # to just apps/desktop's deps so 7GB is plenty. (macos-14-large
          # is paid and your account didn't have spending limit configured.)
          - target: macos-universal
            os: macos-14
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            tauri-args: '--target universal-apple-darwin'
          - target: windows-x64
            os: windows-latest
            rust-targets: 'x86_64-pc-windows-msvc'
            tauri-args: '--target x86_64-pc-windows-msvc'
          # ubuntu-22.04 ships glibc 2.35; mise-installed wasm-pack needs
          # GLIBC_2.39, so use ubuntu-latest (24.04 = glibc 2.39).
          - target: linux-x64
            os: ubuntu-latest
            rust-targets: 'x86_64-unknown-linux-gnu'
            tauri-args: '--target x86_64-unknown-linux-gnu'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      # SSOT: mise installs node, rust (pinned nightly via .mise.toml),
      # wasm-pack, turbo — same toolchain devs use locally. No duplicated
      # tool-version declarations in the workflow.
      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      # Per-platform binary targets (mac universal needs both arches, etc).
      # mise's rust toolchain ships with the channel; platform-specific
      # binary targets are workflow concerns, not project SSOT.
      # `shell: bash` is required because windows-latest defaults to PowerShell.
      - name: Add Rust platform targets
        shell: bash
        run: |
          for t in $(echo "${{ matrix.rust-targets }}" | tr ',' ' '); do
            rustup target add "$t"
          done

      # Tauri's webview / bundling deps. macOS and Windows have what they need
      # in the runner image already; only Linux needs apt installs.
      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      # Install JS deps + build WASM (rust:components dependency ensures
      # rust-src + wasm32 target are present even on cache hits).
      - name: Install JS deps + build WASM
        run: |
          mise run install
          mise run wasm

      # Build only what apps/desktop transitively depends on. Building the
      # whole workspace (including standalone @ifc-lite/viewer with cesium
      # + maplibre chunks) was causing OOM on macos runners.
      - name: Build desktop's workspace deps
        run: mise exec -- pnpm build --filter @ifc-lite/desktop...

      # Tauri-action drives the whole bundle pipeline:
      #   - vite build of the desktop frontend
      #   - cargo build of src-tauri
      #   - platform bundler (.dmg / .msi / .AppImage + .deb)
      # And attaches the bundles to the triggering release if any.
      # Pin to a specific tag — tauri-apps/tauri-action@v0 (the major alias)
      # bundles JS with a top-level await that fails on Node 22 mise installs:
      # "Detected unsettled top-level await ... __webpack_exports__ = await ...".
      # Bumping to action-v0.6.2 picks up the Node-22-compatible build.
      - name: Build & bundle desktop app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional code-signing secrets — if absent, builds are unsigned
          # (functional, but macOS/Windows show "unidentified developer").
          # Add via repo Settings → Secrets to enable signing.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
          releaseName: ${{ github.event_name == 'release' && github.event.release.name || '' }}
          releaseId: ${{ github.event_name == 'release' && github.event.release.id || '' }}
          args: ${{ matrix.tauri-args }}
          # apps/desktop/package.json has the script as "build:local", not the
          # default "tauri". Without this override tauri-action runs `npm run
          # tauri` and fails with "Missing script: tauri".
          tauriScript: pnpm exec tauri

      # For non-release runs, save artifacts so PRs can be downloaded.
      - name: Upload bundles (PR / push)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ifc-lite-desktop-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/*/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/*/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/*/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/*/release/bundle/deb/*.deb
          if-no-files-found: warn
